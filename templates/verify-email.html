<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification email — Yestubers</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/css/style.css?v=10">
</head>
<body class="auth-page">
    <div class="auth-card" style="text-align:center;max-width:420px;margin:8vh auto;">
        <div style="font-size:56px;margin-bottom:16px;">{{ '✅' if success else '⚠️' }}</div>
        <h1>{{ 'Email confirmé' if success else 'Lien invalide' }}</h1>
        <p>{{ message }}</p>
        {% if success %}
        <a href="/dashboard" class="btn-cta" style="margin-top:20px;display:inline-block;">Accéder au dashboard</a>
        {% else %}
        <a href="/login" class="btn-cta" style="margin-top:20px;display:inline-block;">Se connecter</a>
        {% endif %}
    </div>
</body>
</html>

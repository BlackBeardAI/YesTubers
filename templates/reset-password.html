<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — Yestubers</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="manifest" href="/static/manifest.json">

    <meta name="description" content="Choisissez un nouveau mot de passe Yestubers.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/static/css/style.css?v=10">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ambient-bg"></div>
    <nav class="navbar"><div class="container nav-container"><a href="/" class="logo"><span>Yestubers</span></a></div></nav>

    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Nouveau mot de passe</h2>
            </div>
            <form id="new-password-form">
                <input type="hidden" name="token" value="{{ token }}" />
                <label>Nouveau mot de passe</label>
                <input type="password" name="password" required minlength="8" />
                <div id="status" class="status-msg"></div>
                <button type="submit" class="btn-cta full-width">Réinitialiser</button>
            </form>
        </div>
    </section>

    <script>
    document.getElementById('new-password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = new FormData(e.target);
        const status = document.getElementById('status');
        try {
            const r = await fetch('/api/auth/reset', {method:'POST', body: form});
            const data = await r.json();
            if (r.ok) { status.textContent = '✅ Mot de passe mis à jour. Redirection...'; status.className='status-msg success'; setTimeout(()=>location.href='/login', 1500); }
            else { status.textContent = '❌ ' + (data.detail || 'Erreur'); status.className='status-msg error'; }
        } catch(err) { status.textContent = '❌ Erreur réseau'; status.className='status-msg error'; }
    });
    </script>
<script id="nav-links-toggle-js">
(function(){
    var toggle = document.getElementById('nav-toggle');
    var links = document.getElementById('nav-links');
    if (!toggle || !links) return;
    toggle.addEventListener('click', function(){
        links.classList.toggle('open');
        var isOpen = links.classList.contains('open');
        links.style.display = isOpen ? 'flex' : '';
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    links.querySelectorAll('a').forEach(function(a){
        a.addEventListener('click', function(){
            links.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
        });
    });
    document.addEventListener('click', function(e){
        if (!toggle.contains(e.target) && !links.contains(e.target)) {
            links.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
        }
    });
})();
</script>
</body>
</html>
